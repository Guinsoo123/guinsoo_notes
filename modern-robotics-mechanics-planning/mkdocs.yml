site_name: Modern Robotics Study Notes
site_description: 术语导向的 Modern Robotics 中文学习资料
docs_dir: doc
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 全书总览: overview.md
  - 全书术语总表: glossary/README.md
  - 章节目录:
      - chapter-01 Preview（全书预览）:
          - 章节总览: chapter-01/README.md
          - 术语速查: chapter-01/terms.md
          - 机器人学全景与学习路径: chapter-01/section-01-overview.md
      - chapter-02 Configuration Space（构型空间）:
          - 章节总览: chapter-02/README.md
          - 术语速查: chapter-02/terms.md
          - 刚体自由度: chapter-02/section-01-rigid-body-dof.md
          - 机器人自由度与关节: chapter-02/section-02-robot-dof.md
          - 构型空间拓扑与表示: chapter-02/section-03-topology-representation.md
          - 构型与速度约束: chapter-02/section-04-constraints.md
          - 任务空间与工作空间: chapter-02/section-05-task-workspace.md
      - chapter-03 Rigid-Body Motions（刚体运动）:
          - 章节总览: chapter-03/README.md
          - 术语速查: chapter-03/terms.md

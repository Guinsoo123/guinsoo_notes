site_name: curobot Study Notes
site_description: Learning notes and maintenance guide for curobot docs
repo_url: https://github.com/NVlabs/curobo
docs_dir: doc
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 章节索引: CH00_INDEX.md
  - 01 算法设计: CH01_algorithm_design.md
  - 02 软件架构: CH02_software_design.md
  - 03 感知管线: CH03_perception_pipeline.md
  - 04 运控管线: CH04_motion_control_pipeline.md
  - 05 仿真闭环: CH05_simulation_visualization_closure.md
  - 06 运控计算方法: CH06_motion_control_computational_walkthrough.md
